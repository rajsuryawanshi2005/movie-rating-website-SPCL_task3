<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieFlix</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🎬 MovieFlix</h1>

<div class="controls">

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search movies" onkeyup="showSuggestions()">

<div id="suggestions" class="suggestions"></div>

</div>

<button onclick="searchMovies()">Search</button>

</div>

</header>

<div class="categories">

<button onclick="loadRandom()">Random</button>
<button onclick="loadBollywood()">Bollywood</button>
<button onclick="loadTollywood()">Tollywood</button>
<button onclick="loadSeries()">Web Series</button>

</div>

<main>
<div id="movieContainer" class="movie-container"></div>
</main>

<div class="pagination">

<button onclick="prevPage()">Previous</button>

<span id="pageNumbers"></span>

<button onclick="nextPage()">Next</button>

</div>

<div id="movieModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<div id="modalDetails"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
